name: Keep Supabase awake

# Supabase free tier pauses after ~7 days idle, which would kill the demo.
# Cloudflare Workers AI needs no keep-alive — it's a hosted API with no cold start.
on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:       # lets you trigger it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app (touches Postgres)
        run: |
          echo "Pinging ${{ secrets.APP_URL }}/api/keepalive"
          curl --fail --silent --show-error --max-time 60 \
            "${{ secrets.APP_URL }}/api/keepalive"
